name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref — the latest push is the one that matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # The whole ledger lives in unit-testable pure Kotlin (StoreModel) — the rule
      # suite is the real gate. assembleDebug proves the Compose app still wires up.
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Coverage report (kover)
        if: always()
        run: ./gradlew :app:koverXmlReport --no-daemon --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build.nosync/reports/tests/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build.nosync/reports/kover/
